<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 20mm 15mm 20mm 15mm;
    @bottom-center {
      content: "VEXIS Security Report — Page " counter(page) " of " counter(pages);
      font-family: monospace;
      font-size: 8pt;
      color: #666;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 10pt;
    color: #1a1a2e;
    background: #ffffff;
    line-height: 1.5;
  }

  .page-break { page-break-after: always; }

  h1 { font-size: 24pt; font-weight: 800; color: #0f0f1a; }
  h2 { font-size: 16pt; font-weight: 700; color: #0f0f1a; margin-bottom: 12px; margin-top: 24px; }
  h3 { font-size: 12pt; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; margin-top: 16px; }

  p { margin-bottom: 8px; }

  code, .mono {
    font-family: "Fira Code", "Consolas", "Courier New", monospace;
    font-size: 8.5pt;
    background: #f4f4f8;
    padding: 1px 4px;
    border-radius: 3px;
  }

  pre {
    font-family: "Fira Code", "Consolas", "Courier New", monospace;
    font-size: 8pt;
    background: #0f0f1a;
    color: #e2e8f0;
    padding: 12px;
    border-radius: 6px;
    white-space: pre-wrap;
    word-break: break-all;
    margin: 8px 0;
    border-left: 3px solid #00d9ff;
  }

  table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  th {
    background: #1a1a2e;
    color: #e2e8f0;
    padding: 8px 10px;
    text-align: left;
    font-size: 9pt;
    font-weight: 600;
  }
  td { padding: 7px 10px; border-bottom: 1px solid #e8e8f0; font-size: 9pt; }
  tr:nth-child(even) td { background: #f8f8fc; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 8pt;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-critical { background: #ff2d55; color: #fff; }
  .badge-high     { background: #ff6b35; color: #fff; }
  .badge-medium   { background: #ffd60a; color: #1a1a2e; }
  .badge-low      { background: #34c759; color: #fff; }
  .badge-info     { background: #636366; color: #fff; }

  .section-divider {
    border: none;
    border-top: 2px solid #e8e8f0;
    margin: 20px 0;
  }

  .callout {
    border-left: 4px solid #00d9ff;
    background: #f0fbff;
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    margin: 12px 0;
  }

  .callout-warn {
    border-left-color: #ff6b35;
    background: #fff5f0;
  }

  a { color: #0070f3; text-decoration: none; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
